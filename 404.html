<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--cream:#F7F3EE;--ink:#1C1A17;--gold:#A8895A;--ink-soft:#4A4540;--line:rgba(28,26,23,0.12);}
body{font-family:'Jost',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center;}
.eyebrow{font-size:.62rem;letter-spacing:.28em;text-transform:uppercase;color:var(--gold);font-weight:300;margin-bottom:1.5rem;display:flex;align-items:center;justify-content:center;gap:1rem;}
.eyebrow::before,.eyebrow::after{content:'';display:block;width:2rem;height:1px;background:var(--gold);}
h1{font-family:'Cormorant Garamond',serif;font-size:clamp(2.5rem,6vw,5rem);font-weight:300;line-height:1;margin-bottom:1rem;color:var(--ink);}
h1 em{font-style:italic;color:var(--gold);}
p{font-size:.85rem;font-weight:300;color:var(--ink-soft);line-height:1.9;max-width:28rem;margin:0 auto 2.5rem;}
.btn{font-family:'Jost',sans-serif;font-size:.68rem;letter-spacing:.22em;text-transform:uppercase;font-weight:400;color:var(--cream);background:var(--ink);border:none;padding:1rem 2.5rem;cursor:pointer;transition:background .3s;text-decoration:none;display:inline-block;}
.btn:hover{background:var(--gold);}
</style>
</head>
