<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artist Dashboard — Shape of Your Love</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --cream:#F7F3EE;--cream-dark:#EDE6DB;--cream-mid:#F2EDE5;
  --ink:#1C1A17;--ink-soft:#4A4540;
  --gold:#A8895A;--gold-light:#C9A96E;
  --line:rgba(28,26,23,0.12);
  --green:#4A7C59;--red:#8B3A3A;--blue:#3A5A8B;
}
body{font-family:'Jost',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;}
.login-box{background:var(--cream-dark);border:1px solid var(--line);padding:3rem;width:100%;max-width:380px;text-align:center;}
.login-logo{font-family:'Cormorant Garamond',serif;font-size:1rem;letter-spacing:.15em;text-transform:uppercase;margin-bottom:.5rem;}
.login-sub{font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:2rem;font-weight:300;}
.login-input{width:100%;background:var(--cream);border:1px solid var(--line);padding:.9rem 1rem;font-family:'Jost',sans-serif;font-size:.9rem;color:var(--ink);outline:none;margin-bottom:1rem;transition:border-color .3s;}
.login-input:focus{border-color:var(--gold);}
.login-btn{width:100%;padding:1rem;background:var(--ink);color:var(--cream);border:none;font-family:'Jost',sans-serif;font-size:.68rem;letter-spacing:.22em;text-transform:uppercase;cursor:pointer;transition:background .3s;}
.login-btn:hover{background:var(--gold);}
.login-error{font-size:.75rem;color:var(--red);margin-top:.75rem;display:none;}

/* DASHBOARD */
.dashboard{display:none;}
nav{background:var(--ink);padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center;}
.nav-logo{font-family:'Cormorant Garamond',serif;font-size:1rem;letter-spacing:.15em;text-transform:uppercase;color:var(--cream);}
.nav-right{display:flex;align-items:center;gap:1.5rem;}
.nav-tag{font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);font-weight:300;}
.logout-btn{font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;color:rgba(247,243,238,0.4);background:none;border:none;cursor:pointer;font-family:'Jost',sans-serif;transition:color .3s;}
.logout-btn:hover{color:var(--cream);}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);border-bottom:1px solid var(--line);}
.stat{padding:1.5rem 2rem;border-right:1px solid var(--line);text-align:center;}
.stat:last-child{border-right:none;}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:2.2rem;font-weight:300;color:var(--gold);display:block;}
.stat-label{font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;color:var(--ink-soft);font-weight:300;margin-top:.2rem;display:block;}

/* FILTERS */
.filters{padding:1.25rem 2rem;border-bottom:1px solid var(--line);display:flex;gap:.75rem;align-items:center;flex-wrap:wrap;}
.filter-btn{font-family:'Jost',sans-serif;font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;padding:.5rem 1rem;border:1px solid var(--line);background:var(--cream);color:var(--ink-soft);cursor:pointer;transition:all .2s;font-weight:300;}
.filter-btn.active{background:var(--ink);color:var(--cream);border-color:var(--ink);}
.filter-btn:hover:not(.active){border-color:var(--gold);color:var(--gold);}
.refresh-btn{margin-left:auto;font-family:'Jost',sans-serif;font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;padding:.5rem 1rem;border:1px solid var(--gold);background:transparent;color:var(--gold);cursor:pointer;transition:all .2s;}
.refresh-btn:hover{background:var(--gold);color:var(--cream);}

/* ORDERS */
.orders-wrap{padding:2rem;}
.loading{text-align:center;padding:4rem;font-size:.8rem;color:var(--ink-soft);letter-spacing:.1em;}
.empty{text-align:center;padding:4rem;}
.empty p{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:300;color:var(--ink-soft);}

.order-card{background:white;border:1px solid var(--line);margin-bottom:1rem;overflow:hidden;}
.order-header{padding:1.25rem 1.5rem;display:grid;grid-template-columns:auto 1fr auto auto auto auto;gap:1.25rem;align-items:center;cursor:pointer;}
.order-names{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:400;}
.order-meta{display:flex;gap:.75rem;flex-wrap:wrap;}
.meta-tag{font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);font-weight:300;background:var(--cream);padding:.25rem .5rem;border:1px solid var(--line);}
.order-price{font-family:'Cormorant Garamond',serif;font-size:1.1rem;color:var(--gold);}
.order-date{font-size:.62rem;color:var(--ink-soft);font-weight:300;white-space:nowrap;}
.status-badge{font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;padding:.3rem .65rem;white-space:nowrap;}
.status-new{background:#FFF3CD;color:#856404;border:1px solid #FFECB5;}
.status-shapes_sent{background:#CCE5FF;color:#004085;border:1px solid #B8DAFF;}
.status-shape_chosen{background:#D4EDDA;color:#155724;border:1px solid #C3E6CB;}
.status-shipped{background:#D1ECF1;color:#0C5460;border:1px solid #BEE5EB;}
.status-complete{background:#E2E3E5;color:#383D41;border:1px solid #D6D8DB;}
.chevron{transition:transform .3s;font-size:.7rem;color:var(--ink-soft);}
.chevron.open{transform:rotate(180deg);}

.order-body{display:none;border-top:1px solid var(--line);background:var(--cream);}
.order-body.open{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0;}

.body-section{padding:1.5rem;border-right:1px solid var(--line);}
.body-section:last-child{border-right:none;}
.body-section h4{font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);font-weight:300;margin-bottom:1rem;}

.detail-row{display:flex;justify-content:space-between;padding:.45rem 0;border-bottom:1px solid var(--line);font-size:.78rem;}
.detail-row:last-child{border-bottom:none;}
.detail-label{color:var(--ink-soft);font-weight:300;}
.detail-email{font-size:.72rem;color:var(--blue);word-break:break-all;}

/* UPLOAD AREA */
.upload-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem;margin-bottom:1rem;}
.upload-slot{border:1px dashed var(--line);aspect-ratio:1/1;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:border-color .3s;position:relative;overflow:hidden;background:white;}
.upload-slot:hover{border-color:var(--gold);}
.upload-slot.has-image{border-style:solid;border-color:var(--ink);}
.upload-slot img{width:100%;height:100%;object-fit:contain;padding:.5rem;}
.upload-slot .slot-label{font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft);font-weight:300;margin-top:.35rem;}
.upload-slot .slot-icon{font-size:1.2rem;color:var(--ink-soft);opacity:.4;}
.upload-slot input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;}
.upload-slot .remove-btn{position:absolute;top:.3rem;right:.3rem;background:var(--ink);color:var(--cream);border:none;width:1.2rem;height:1.2rem;font-size:.6rem;cursor:pointer;display:none;align-items:center;justify-content:center;}
.upload-slot.has-image .remove-btn{display:flex;}

.btn-upload-shapes{width:100%;padding:.85rem;background:var(--gold);color:var(--cream);border:none;font-family:'Jost',sans-serif;font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;cursor:pointer;transition:background .3s;margin-bottom:.75rem;}
.btn-upload-shapes:hover{background:var(--ink);}
.btn-upload-shapes:disabled{opacity:.4;cursor:not-allowed;}

/* ACTIONS */
.status-select{width:100%;background:white;border:1px solid var(--line);padding:.7rem .9rem;font-family:'Jost',sans-serif;font-size:.78rem;color:var(--ink);outline:none;margin-bottom:.75rem;cursor:pointer;}
.notes-input{width:100%;background:white;border:1px solid var(--line);padding:.7rem .9rem;font-family:'Jost',sans-serif;font-size:.78rem;color:var(--ink);outline:none;margin-bottom:.75rem;resize:vertical;min-height:70px;}
.action-btns{display:flex;gap:.6rem;flex-wrap:wrap;align-items:center;}
.btn-save{font-family:'Jost',sans-serif;font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;padding:.65rem 1.25rem;background:var(--ink);color:var(--cream);border:none;cursor:pointer;transition:background .3s;}
.btn-save:hover{background:var(--gold);}
.btn-email{font-family:'Jost',sans-serif;font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;padding:.65rem 1.25rem;background:transparent;color:var(--ink);border:1px solid var(--line);cursor:pointer;transition:all .3s;text-decoration:none;display:inline-block;}
.btn-email:hover{border-color:var(--gold);color:var(--gold);}
.btn-copy-link{font-family:'Jost',sans-serif;font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;padding:.65rem 1.25rem;background:transparent;color:var(--blue);border:1px solid rgba(58,90,139,0.3);cursor:pointer;transition:all .3s;}
.btn-copy-link:hover{background:rgba(58,90,139,0.08);}
.save-confirm{font-size:.7rem;color:var(--green);display:none;}

/* SHAPE CHOICE INDICATOR */
.choice-indicator{background:#D4EDDA;border:1px solid #C3E6CB;padding:.6rem 1rem;font-size:.75rem;color:#155724;margin-bottom:.75rem;display:none;}
.choice-indicator.visible{display:block;}

@media(max-width:900px){
  .order-body.open{grid-template-columns:1fr;}
  .body-section{border-right:none;border-bottom:1px solid var(--line);}
  .body-section:last-child{border-bottom:none;}
  .stats{grid-template-columns:1fr 1fr;}
  .stat:nth-child(2){border-right:none;}
  .stat:nth-child(3){border-top:1px solid var(--line);}
}
@media(max-width:640px){
  .order-header{grid-template-columns:1fr auto;}
  .order-meta,.order-price,.order-date{display:none;}
  .orders-wrap{padding:1rem;}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <div class="login-logo">Shape of Your Love</div>
    <div class="login-sub">Artist Dashboard</div>
    <input class="login-input" type="password" id="pwInput" placeholder="Enter password" onkeydown="if(event.key==='Enter')doLogin()"/>
    <button class="login-btn" onclick="doLogin()">Enter Dashboard</button>
    <div class="login-error" id="loginError">Incorrect password.</div>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashWrap">
  <nav>
    <div class="nav-logo">Shape of Your Love</div>
    <div class="nav-right">
      <span class="nav-tag">Artist Dashboard</span>
      <button class="logout-btn" onclick="doLogout()">Log out</button>
    </div>
  </nav>

  <div class="stats">
    <div class="stat"><span class="stat-num" id="st-total">—</span><span class="stat-label">Total orders</span></div>
    <div class="stat"><span class="stat-num" id="st-new">—</span><span class="stat-label">Awaiting shapes</span></div>
    <div class="stat"><span class="stat-num" id="st-progress">—</span><span class="stat-label">In progress</span></div>
    <div class="stat"><span class="stat-num" id="st-revenue">—</span><span class="stat-label">Total revenue</span></div>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
    <button class="filter-btn" onclick="setFilter('new',this)">New</button>
    <button class="filter-btn" onclick="setFilter('shapes_sent',this)">Shapes sent</button>
    <button class="filter-btn" onclick="setFilter('shape_chosen',this)">Shape chosen</button>
    <button class="filter-btn" onclick="setFilter('shipped',this)">Shipped</button>
    <button class="filter-btn" onclick="setFilter('complete',this)">Complete</button>
    <button class="refresh-btn" onclick="loadOrders()">↻ Refresh</button>
  </div>

  <div class="orders-wrap" id="ordersWrap">
    <div class="loading">Loading orders...</div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://dyskzfwoybldgkpdlcdo.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR5c2t6ZndveWJsZGdrcGRsY2RvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5NDM2NjQsImV4cCI6MjA5NDUxOTY2NH0.-Q45yFi5Mw4gtPu7onwUrlHL4kAcps5DhQDQARJaO9E';
const DASHBOARD_PASSWORD = 'soyl2026';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

let allOrders = [];
let currentFilter = 'all';
const pendingUploads = {}; // orderId -> [file, file, file]

function doLogin() {
  if (document.getElementById('pwInput').value === DASHBOARD_PASSWORD) {
    sessionStorage.setItem('soyl_auth', '1');
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('dashWrap').style.display = 'block';
    loadOrders();
  } else {
    document.getElementById('loginError').style.display = 'block';
  }
}
function doLogout() { sessionStorage.removeItem('soyl_auth'); location.reload(); }

window.addEventListener('DOMContentLoaded', () => {
  if (sessionStorage.getItem('soyl_auth') === '1') {
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('dashWrap').style.display = 'block';
    loadOrders();
  }
});

async function loadOrders() {
  document.getElementById('ordersWrap').innerHTML = '<div class="loading">Loading orders...</div>';
  const { data, error } = await db.from('orders').select('*').order('created_at', { ascending: false });
  if (error) { document.getElementById('ordersWrap').innerHTML = '<div class="loading">Error loading.</div>'; return; }
  allOrders = data || [];
  updateStats();
  renderOrders();
}

function updateStats() {
  document.getElementById('st-total').textContent = allOrders.length;
  document.getElementById('st-new').textContent = allOrders.filter(o => o.status === 'new').length;
  document.getElementById('st-progress').textContent = allOrders.filter(o => ['shapes_sent','shape_chosen'].includes(o.status)).length;
  document.getElementById('st-revenue').textContent = '$' + allOrders.reduce((s,o) => s + Number(o.price||0), 0).toLocaleString();
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderOrders();
}

function renderOrders() {
  const filtered = currentFilter === 'all' ? allOrders : allOrders.filter(o => o.status === currentFilter);
  const wrap = document.getElementById('ordersWrap');
  if (!filtered.length) { wrap.innerHTML = '<div class="empty"><p>No orders here yet.</p></div>'; return; }
  wrap.innerHTML = filtered.map(o => orderCard(o)).join('');
}

const statusLabels = { new:'New', shapes_sent:'Shapes sent', shape_chosen:'Shape chosen', shipped:'Shipped', complete:'Complete' };
function fmtDate(d) { return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}); }

function orderCard(o) {
  const choiceIndicator = o.shape_choice !== null && o.shape_choice !== undefined
    ? `<div class="choice-indicator visible">✓ Customer chose Variation ${o.shape_choice + 1}</div>` : '';
  const uploadedPreviews = o.shape_urls && o.shape_urls.length
    ? o.shape_urls.map((url,i) => `<div class="upload-slot has-image" id="slot-${o.id}-${i}">
        <img src="${url}" alt="Shape ${i+1}"/>
        <div class="slot-label">Variation ${i+1}</div>
      </div>`).join('')
    : [0,1,2].map(i => `<div class="upload-slot" id="slot-${o.id}-${i}">
        <span class="slot-icon">+</span>
        <div class="slot-label">Variation ${i+1}</div>
        <input type="file" accept="image/*" onchange="handleFileSelect('${o.id}',${i},this)"/>
      </div>`).join('');

  return `<div class="order-card" id="card-${o.id}">
    <div class="order-header" onclick="toggleCard('${o.id}')">
      <div class="order-names">${o.name1} &amp; ${o.name2}</div>
      <div class="order-meta">
        <span class="meta-tag">${o.jewelry_type}</span>
        <span class="meta-tag">${o.material}</span>
        <span class="meta-tag">${o.email}</span>
      </div>
      <div class="order-price">$${o.price}</div>
      <div class="order-date">${fmtDate(o.created_at)}</div>
      <span class="status-badge status-${o.status}">${statusLabels[o.status]||o.status}</span>
      <span class="chevron" id="chev-${o.id}">▾</span>
    </div>
    <div class="order-body" id="body-${o.id}">
      <div class="body-section">
        <h4>Order details</h4>
        <div class="detail-row"><span class="detail-label">Names</span><span>${o.name1} &amp; ${o.name2}</span></div>
        <div class="detail-row"><span class="detail-label">Type</span><span>${o.jewelry_type}</span></div>
        <div class="detail-row"><span class="detail-label">Material</span><span>${o.material}</span></div>
        <div class="detail-row"><span class="detail-label">Paid</span><span style="color:var(--gold)">$${o.price}</span></div>
        <div class="detail-row"><span class="detail-label">Date</span><span>${fmtDate(o.created_at)}</span></div>
        <div class="detail-row"><span class="detail-label">Email</span><span class="detail-email">${o.email}</span></div>
        <div class="detail-row" style="align-items:flex-start;"><span class="detail-label">Ship to</span><span style="text-align:right;line-height:1.7;font-size:.78rem;">${o.shipping_name||'—'}${o.shipping_address1 ? '<br>'+o.shipping_address1 : ''}${o.shipping_address2 ? '<br>'+o.shipping_address2 : ''}<br>${o.shipping_city||''}${o.shipping_postal ? ' '+o.shipping_postal : ''}<br>${o.shipping_country||''}</span></div>
        <div class="detail-row"><span class="detail-label">PayPal</span><span style="font-size:.68rem;opacity:.5">${o.paypal_order_id||'—'}</span></div>
      </div>
      <div class="body-section">
        <h4>Shape variations</h4>
        ${choiceIndicator}
        <div class="upload-grid" id="upload-grid-${o.id}">${uploadedPreviews}</div>
        ${!o.shape_urls || !o.shape_urls.length ? `<button class="btn-upload-shapes" id="btn-upload-${o.id}" onclick="uploadShapes('${o.id}')" disabled>Upload & send to customer</button>` : `<button class="btn-copy-link" onclick="copyChooseLink('${o.id}')">⧉ Copy customer link</button>`}
        <div class="save-confirm" id="upload-conf-${o.id}">✓ Shapes uploaded & link ready</div>
      </div>
      <div class="body-section">
        <h4>Update order</h4>
        <select class="status-select" id="status-${o.id}">
          <option value="new" ${o.status==='new'?'selected':''}>New — awaiting shapes</option>
          <option value="shapes_sent" ${o.status==='shapes_sent'?'selected':''}>Shapes sent to customer</option>
          <option value="shape_chosen" ${o.status==='shape_chosen'?'selected':''}>Shape chosen — casting</option>
          <option value="shipped" ${o.status==='shipped'?'selected':''}>Shipped</option>
          <option value="complete" ${o.status==='complete'?'selected':''}>Complete</option>
        </select>
        <textarea class="notes-input" id="notes-${o.id}" placeholder="Notes, tracking number, etc.">${o.notes||''}</textarea>
        <div class="action-btns">
          <button class="btn-save" onclick="saveOrder('${o.id}')">Save</button>
          <button class="btn-email" onclick="openGmail('${o.email}', '${o.name1}', '${o.name2}', '${o.id}')">✉ Email customer</button>
          <span class="save-confirm" id="conf-${o.id}">✓ Saved</span>
        </div>
      </div>
    </div>
  </div>`;
}

function toggleCard(id) {
  document.getElementById('body-'+id).classList.toggle('open');
  document.getElementById('chev-'+id).classList.toggle('open');
}

function handleFileSelect(orderId, slotIndex, input) {
  if (!input.files[0]) return;
  if (!pendingUploads[orderId]) pendingUploads[orderId] = [null,null,null];
  pendingUploads[orderId][slotIndex] = input.files[0];
  // Preview
  const slot = document.getElementById(`slot-${orderId}-${slotIndex}`);
  const reader = new FileReader();
  reader.onload = e => {
    slot.innerHTML = `<img src="${e.target.result}" style="width:100%;height:100%;object-fit:contain;padding:.5rem"/>
      <div class="slot-label">Variation ${slotIndex+1}</div>
      <input type="file" accept="image/*" onchange="handleFileSelect('${orderId}',${slotIndex},this)"/>`;
    slot.classList.add('has-image');
  };
  reader.readAsDataURL(input.files[0]);
  // Enable upload button if at least 1 file
  const btn = document.getElementById(`btn-upload-${orderId}`);
  if (btn && pendingUploads[orderId].some(f => f)) btn.disabled = false;
}

async function uploadShapes(orderId) {
  const files = pendingUploads[orderId];
  if (!files || !files.some(f => f)) return;
  const btn = document.getElementById(`btn-upload-${orderId}`);
  btn.disabled = true;
  btn.textContent = 'Uploading...';

  const urls = [];
  for (let i = 0; i < 3; i++) {
    if (!files[i]) continue;
    const path = `${orderId}/variation-${i+1}-${Date.now()}.jpg`;
    const { error } = await db.storage.from('shapes').upload(path, files[i], { upsert: true });
    if (error) { alert('Upload failed for variation ' + (i+1)); btn.disabled = false; btn.textContent = 'Upload & send to customer'; return; }
    const { data: urlData } = db.storage.from('shapes').getPublicUrl(path);
    urls.push(urlData.publicUrl);
  }

  // Save URLs to order
  const { error: updateError } = await db.from('orders').update({ shape_urls: urls, status: 'shapes_sent' }).eq('id', orderId);
  if (updateError) { alert('Failed to save URLs'); return; }

  // Update local
  const order = allOrders.find(o => o.id === orderId);
  if (order) { order.shape_urls = urls; order.status = 'shapes_sent'; }

  const conf = document.getElementById(`upload-conf-${orderId}`);
  conf.style.display = 'inline';
  btn.textContent = '✓ Uploaded';

  // Update status badge
  const badge = document.querySelector(`#card-${orderId} .status-badge`);
  if (badge) { badge.className = 'status-badge status-shapes_sent'; badge.textContent = 'Shapes sent'; }
}

function copyChooseLink(orderId) {
  const link = `https://shapeofyourlove.com/choose.html?order=${orderId}`;
  navigator.clipboard.writeText(link);
  const btn = event.target;
  btn.textContent = '✓ Copied!';
  setTimeout(() => btn.textContent = '⧉ Copy customer link', 2000);
}

async function saveOrder(id) {
  const status = document.getElementById('status-'+id).value;
  const notes = document.getElementById('notes-'+id).value;
  const { error } = await db.from('orders').update({ status, notes }).eq('id', id);
  if (!error) {
    const conf = document.getElementById('conf-'+id);
    conf.style.display = 'inline';
    setTimeout(() => conf.style.display = 'none', 2500);
    const order = allOrders.find(o => o.id === id);
    if (order) { order.status = status; order.notes = notes; }
    const badge = document.querySelector(`#card-${id} .status-badge`);
    if (badge) { badge.className = 'status-badge status-'+status; badge.textContent = statusLabels[status]||status; }
  }
}

function openGmail(email, name1, name2, orderId) {
  const subject = encodeURIComponent(`Your Shape of Your Love variations — ${name1} & ${name2}`);
  const body = encodeURIComponent(
    `Hi,\n\nYour hand-drawn shape variations for ${name1} & ${name2} are ready — please choose your favourite:\n\nhttps://shapeofyourlove.com/choose.html?order=${orderId}\n\nWarm regards,\nShape of Your Love`
  );
  window.open(`https://mail.google.com/mail/u/0/?view=cm&to=${encodeURIComponent(email)}&su=${subject}&body=${body}`, '_blank');
}
</script>
