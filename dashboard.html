<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artist Dashboard — Shape of Your Love</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --cream:#F7F3EE;--cream-dark:#EDE6DB;--cream-mid:#F2EDE5;
  --ink:#1C1A17;--ink-soft:#4A4540;
  --gold:#A8895A;--gold-light:#C9A96E;
  --line:rgba(28,26,23,0.12);
  --green:#4A7C59;--red:#8B3A3A;--blue:#3A5A8B;
}
html{scroll-behavior:smooth;}
body{font-family:'Jost',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;}
.login-box{background:var(--cream-dark);border:1px solid var(--line);padding:3rem;width:100%;max-width:380px;text-align:center;}
.login-logo{font-family:'Cormorant Garamond',serif;font-size:1rem;letter-spacing:.15em;text-transform:uppercase;margin-bottom:.5rem;}
.login-sub{font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:2rem;font-weight:300;}
.login-input{width:100%;background:var(--cream);border:1px solid var(--line);padding:.9rem 1rem;font-family:'Jost',sans-serif;font-size:.9rem;color:var(--ink);outline:none;margin-bottom:1rem;transition:border-color .3s;}
.login-input:focus{border-color:var(--gold);}
.login-btn{width:100%;padding:1rem;background:var(--ink);color:var(--cream);border:none;font-family:'Jost',sans-serif;font-size:.68rem;letter-spacing:.22em;text-transform:uppercase;cursor:pointer;transition:background .3s;}
.login-btn:hover{background:var(--gold);}
.login-error{font-size:.75rem;color:var(--red);margin-top:.75rem;display:none;}

/* DASHBOARD */
.dashboard{display:none;}
nav{background:var(--ink);padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center;}
.nav-logo{font-family:'Cormorant Garamond',serif;font-size:1rem;letter-spacing:.15em;text-transform:uppercase;color:var(--cream);}
.nav-right{display:flex;align-items:center;gap:1.5rem;}
.nav-tag{font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);font-weight:300;}
.logout-btn{font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;color:rgba(247,243,238,0.4);background:none;border:none;cursor:pointer;font-family:'Jost',sans-serif;transition:color .3s;}
.logout-btn:hover{color:var(--cream);}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:0;border-bottom:1px solid var(--line);}
.stat{padding:1.5rem 2rem;border-right:1px solid var(--line);text-align:center;}
.stat:last-child{border-right:none;}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:2.2rem;font-weight:300;color:var(--gold);display:block;}
.stat-label{font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;color:var(--ink-soft);font-weight:300;margin-top:.2rem;display:block;}

/* FILTERS */
.filters{padding:1.25rem 2rem;border-bottom:1px solid var(--line);display:flex;gap:.75rem;align-items:center;flex-wrap:wrap;}
.filter-btn{font-family:'Jost',sans-serif;font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;padding:.5rem 1rem;border:1px solid var(--line);background:var(--cream);color:var(--ink-soft);cursor:pointer;transition:all .2s;font-weight:300;}
.filter-btn.active{background:var(--ink);color:var(--cream);border-color:var(--ink);}
.filter-btn:hover:not(.active){border-color:var(--gold);color:var(--gold);}
.refresh-btn{margin-left:auto;font-family:'Jost',sans-serif;font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;padding:.5rem 1rem;border:1px solid var(--gold);background:transparent;color:var(--gold);cursor:pointer;transition:all .2s;}
.refresh-btn:hover{background:var(--gold);color:var(--cream);}

/* ORDERS */
.orders-wrap{padding:2rem;}
.loading{text-align:center;padding:4rem;font-size:.8rem;color:var(--ink-soft);letter-spacing:.1em;}
.empty{text-align:center;padding:4rem;}
.empty p{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:300;color:var(--ink-soft);}
.empty span{font-size:.75rem;color:var(--ink-soft);opacity:.6;display:block;margin-top:.5rem;}

.order-card{background:white;border:1px solid var(--line);margin-bottom:1rem;overflow:hidden;transition:border-color .3s;}
.order-card:hover{border-color:var(--gold);}
.order-header{padding:1.25rem 1.5rem;display:grid;grid-template-columns:auto 1fr auto auto auto;gap:1.5rem;align-items:center;cursor:pointer;}
.order-names{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:400;}
.order-meta{display:flex;gap:1rem;flex-wrap:wrap;}
.meta-tag{font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft);font-weight:300;background:var(--cream);padding:.3rem .6rem;border:1px solid var(--line);}
.order-price{font-family:'Cormorant Garamond',serif;font-size:1.2rem;color:var(--gold);}
.order-date{font-size:.65rem;color:var(--ink-soft);font-weight:300;white-space:nowrap;}
.status-badge{font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;padding:.35rem .75rem;font-weight:400;border-radius:0;white-space:nowrap;}
.status-new{background:#FFF3CD;color:#856404;border:1px solid #FFECB5;}
.status-shapes_sent{background:#CCE5FF;color:#004085;border:1px solid #B8DAFF;}
.status-shape_chosen{background:#D4EDDA;color:#155724;border:1px solid #C3E6CB;}
.status-shipped{background:#D1ECF1;color:#0C5460;border:1px solid #BEE5EB;}
.status-complete{background:#E2E3E5;color:#383D41;border:1px solid #D6D8DB;}

.order-body{display:none;padding:1.5rem;border-top:1px solid var(--line);background:var(--cream);}
.order-body.open{display:grid;grid-template-columns:1fr 1fr;gap:2rem;}

.detail-section h4{font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);font-weight:300;margin-bottom:1rem;}
.detail-row{display:flex;justify-content:space-between;padding:.5rem 0;border-bottom:1px solid var(--line);font-size:.8rem;}
.detail-row:last-child{border-bottom:none;}
.detail-label{color:var(--ink-soft);font-weight:300;}
.detail-value{font-weight:400;}
.detail-email{font-family:monospace;font-size:.75rem;color:var(--blue);word-break:break-all;}

.actions-section h4{font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);font-weight:300;margin-bottom:1rem;}
.status-select{width:100%;background:var(--cream-dark);border:1px solid var(--line);padding:.75rem 1rem;font-family:'Jost',sans-serif;font-size:.78rem;color:var(--ink);outline:none;margin-bottom:1rem;cursor:pointer;}
.notes-input{width:100%;background:var(--cream-dark);border:1px solid var(--line);padding:.75rem 1rem;font-family:'Jost',sans-serif;font-size:.78rem;color:var(--ink);outline:none;margin-bottom:1rem;resize:vertical;min-height:80px;}
.action-btns{display:flex;gap:.75rem;flex-wrap:wrap;}
.btn-save{font-family:'Jost',sans-serif;font-size:.62rem;letter-spacing:.15em;text-transform:uppercase;padding:.7rem 1.5rem;background:var(--ink);color:var(--cream);border:none;cursor:pointer;transition:background .3s;}
.btn-save:hover{background:var(--gold);}
.btn-email{font-family:'Jost',sans-serif;font-size:.62rem;letter-spacing:.15em;text-transform:uppercase;padding:.7rem 1.5rem;background:transparent;color:var(--ink);border:1px solid var(--line);cursor:pointer;transition:all .3s;text-decoration:none;display:inline-block;}
.btn-email:hover{border-color:var(--gold);color:var(--gold);}
.save-confirm{font-size:.7rem;color:var(--green);margin-left:.5rem;display:none;}

.chevron{transition:transform .3s;font-size:.7rem;color:var(--ink-soft);}
.chevron.open{transform:rotate(180deg);}

@media(max-width:768px){
  .stats{grid-template-columns:1fr 1fr;}
  .stat:nth-child(2){border-right:none;}
  .stat:nth-child(3){border-top:1px solid var(--line);}
  .order-header{grid-template-columns:1fr auto;gap:.75rem;}
  .order-meta{display:none;}
  .order-body.open{grid-template-columns:1fr;}
  .orders-wrap{padding:1rem;}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <div class="login-logo">Shape of Your Love</div>
    <div class="login-sub">Artist Dashboard</div>
    <input class="login-input" type="password" id="pwInput" placeholder="Enter password" onkeydown="if(event.key==='Enter')doLogin()"/>
    <button class="login-btn" onclick="doLogin()">Enter Dashboard</button>
    <div class="login-error" id="loginError">Incorrect password. Try again.</div>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashWrap">
  <nav>
    <div class="nav-logo">Shape of Your Love</div>
    <div class="nav-right">
      <span class="nav-tag">Artist Dashboard</span>
      <button class="logout-btn" onclick="doLogout()">Log out</button>
    </div>
  </nav>

  <div class="stats">
    <div class="stat"><span class="stat-num" id="st-total">—</span><span class="stat-label">Total orders</span></div>
    <div class="stat"><span class="stat-num" id="st-new">—</span><span class="stat-label">Awaiting shapes</span></div>
    <div class="stat"><span class="stat-num" id="st-progress">—</span><span class="stat-label">In progress</span></div>
    <div class="stat"><span class="stat-num" id="st-revenue">—</span><span class="stat-label">Total revenue</span></div>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
    <button class="filter-btn" onclick="setFilter('new',this)">New</button>
    <button class="filter-btn" onclick="setFilter('shapes_sent',this)">Shapes sent</button>
    <button class="filter-btn" onclick="setFilter('shape_chosen',this)">Shape chosen</button>
    <button class="filter-btn" onclick="setFilter('shipped',this)">Shipped</button>
    <button class="filter-btn" onclick="setFilter('complete',this)">Complete</button>
    <button class="refresh-btn" onclick="loadOrders()">↻ Refresh</button>
  </div>

  <div class="orders-wrap" id="ordersWrap">
    <div class="loading">Loading orders...</div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://dyskzfwoybldgkpdlcdo.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR5c2t6ZndveWJsZGdrcGRsY2RvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5NDM2NjQsImV4cCI6MjA5NDUxOTY2NH0.-Q45yFi5Mw4gtPu7onwUrlHL4kAcps5DhQDQARJaO9E';
const DASHBOARD_PASSWORD = 'soyl2026';

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

let allOrders = [];
let currentFilter = 'all';

// LOGIN
function doLogin() {
  const pw = document.getElementById('pwInput').value;
  if (pw === DASHBOARD_PASSWORD) {
    sessionStorage.setItem('soyl_auth', '1');
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('dashWrap').style.display = 'block';
    loadOrders();
  } else {
    document.getElementById('loginError').style.display = 'block';
  }
}

function doLogout() {
  sessionStorage.removeItem('soyl_auth');
  location.reload();
}

// Check session
window.addEventListener('DOMContentLoaded', () => {
  if (sessionStorage.getItem('soyl_auth') === '1') {
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('dashWrap').style.display = 'block';
    loadOrders();
  }
});

// LOAD ORDERS
async function loadOrders() {
  document.getElementById('ordersWrap').innerHTML = '<div class="loading">Loading orders...</div>';
  const { data, error } = await db.from('orders').select('*').order('created_at', { ascending: false });
  if (error) {
    document.getElementById('ordersWrap').innerHTML = '<div class="loading">Error loading orders. Check console.</div>';
    console.error(error);
    return;
  }
  allOrders = data || [];
  updateStats();
  renderOrders();
}

function updateStats() {
  const total = allOrders.length;
  const newOrders = allOrders.filter(o => o.status === 'new').length;
  const inProgress = allOrders.filter(o => ['shapes_sent','shape_chosen'].includes(o.status)).length;
  const revenue = allOrders.reduce((sum, o) => sum + Number(o.price || 0), 0);
  document.getElementById('st-total').textContent = total;
  document.getElementById('st-new').textContent = newOrders;
  document.getElementById('st-progress').textContent = inProgress;
  document.getElementById('st-revenue').textContent = '$' + revenue.toLocaleString();
}

function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderOrders();
}

function renderOrders() {
  const filtered = currentFilter === 'all' ? allOrders : allOrders.filter(o => o.status === currentFilter);
  const wrap = document.getElementById('ordersWrap');
  if (filtered.length === 0) {
    wrap.innerHTML = '<div class="empty"><p>No orders here yet.</p><span>They\'ll appear as customers complete checkout.</span></div>';
    return;
  }
  wrap.innerHTML = filtered.map(order => orderCard(order)).join('');
}

function statusLabel(s) {
  const map = { new:'New', shapes_sent:'Shapes sent', shape_chosen:'Shape chosen', shipped:'Shipped', complete:'Complete' };
  return map[s] || s;
}

function formatDate(d) {
  return new Date(d).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
}

function orderCard(o) {
  return `
  <div class="order-card" id="card-${o.id}">
    <div class="order-header" onclick="toggleCard('${o.id}')">
      <div class="order-names">${o.name1} &amp; ${o.name2}</div>
      <div class="order-meta">
        <span class="meta-tag">${o.jewelry_type}</span>
        <span class="meta-tag">${o.material}</span>
        <span class="meta-tag">${o.email}</span>
      </div>
      <div class="order-price">$${o.price}</div>
      <div class="order-date">${formatDate(o.created_at)}</div>
      <span class="status-badge status-${o.status}">${statusLabel(o.status)}</span>
      <span class="chevron" id="chev-${o.id}">▾</span>
    </div>
    <div class="order-body" id="body-${o.id}">
      <div class="detail-section">
        <h4>Order details</h4>
        <div class="detail-row"><span class="detail-label">Names</span><span class="detail-value">${o.name1} &amp; ${o.name2}</span></div>
        <div class="detail-row"><span class="detail-label">Jewelry type</span><span class="detail-value">${o.jewelry_type}</span></div>
        <div class="detail-row"><span class="detail-label">Material</span><span class="detail-value">${o.material}</span></div>
        <div class="detail-row"><span class="detail-label">Price paid</span><span class="detail-value">$${o.price}</span></div>
        <div class="detail-row"><span class="detail-label">Order date</span><span class="detail-value">${formatDate(o.created_at)}</span></div>
        <div class="detail-row"><span class="detail-label">PayPal ID</span><span class="detail-value" style="font-size:.72rem;opacity:.6">${o.paypal_order_id || '—'}</span></div>
        <div class="detail-row"><span class="detail-label">Customer email</span><span class="detail-value detail-email">${o.email}</span></div>
      </div>
      <div class="actions-section">
        <h4>Update order</h4>
        <select class="status-select" id="status-${o.id}">
          <option value="new" ${o.status==='new'?'selected':''}>New — awaiting shapes</option>
          <option value="shapes_sent" ${o.status==='shapes_sent'?'selected':''}>Shapes sent to customer</option>
          <option value="shape_chosen" ${o.status==='shape_chosen'?'selected':''}>Shape chosen — casting</option>
          <option value="shipped" ${o.status==='shipped'?'selected':''}>Shipped</option>
          <option value="complete" ${o.status==='complete'?'selected':''}>Complete</option>
        </select>
        <textarea class="notes-input" id="notes-${o.id}" placeholder="Add notes (tracking number, shape choice, etc)">${o.notes || ''}</textarea>
        <div class="action-btns">
          <button class="btn-save" onclick="saveOrder('${o.id}')">Save changes</button>
          <a class="btn-email" href="mailto:${o.email}?subject=Your Shape of Your Love design variations — ${o.name1} %26 ${o.name2}&body=Hi there,%0A%0AThank you for your order! Your hand-drawn shape variations for ${o.name1} %26 ${o.name2} are ready.%0A%0APlease reply to this email with your chosen variation and we'll begin casting your ${o.material} ${o.jewelry_type}.%0A%0AWarm regards,%0AShape of Your Love">
            ✉ Email customer
          </a>
          <span class="save-confirm" id="conf-${o.id}">✓ Saved</span>
        </div>
      </div>
    </div>
  </div>`;
}

function toggleCard(id) {
  const body = document.getElementById('body-' + id);
  const chev = document.getElementById('chev-' + id);
  body.classList.toggle('open');
  chev.classList.toggle('open');
}

async function saveOrder(id) {
  const status = document.getElementById('status-' + id).value;
  const notes = document.getElementById('notes-' + id).value;
  const { error } = await db.from('orders').update({ status, notes }).eq('id', id);
  if (!error) {
    const conf = document.getElementById('conf-' + id);
    conf.style.display = 'inline';
    setTimeout(() => conf.style.display = 'none', 2500);
    // Update local data
    const order = allOrders.find(o => o.id === id);
    if (order) { order.status = status; order.notes = notes; }
    // Update badge in header
    const card = document.getElementById('card-' + id);
    const badge = card.querySelector('.status-badge');
    badge.className = 'status-badge status-' + status;
    badge.textContent = statusLabel(status);
  } else {
    alert('Save failed. Check console.');
    console.error(error);
  }
}
</script>
</body>
</html>
